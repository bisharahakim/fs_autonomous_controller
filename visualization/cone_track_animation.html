<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formula Student Pure Pursuit Animation</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101316;
      color: #f3f5f4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #101316;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid #293138;
      background: #151a1f;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      height: 36px;
      min-width: 42px;
      border: 1px solid #3a4650;
      border-radius: 6px;
      background: #202830;
      color: #f3f5f4;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    button:hover {
      background: #2a3540;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c7d0d6;
      font-size: 13px;
    }

    input[type="range"] {
      width: 130px;
      accent-color: #7cc7a0;
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #20251f;
    }

    aside {
      border-left: 1px solid #293138;
      padding: 16px;
      background: #151a1f;
      overflow: auto;
    }

    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid #263039;
      font-size: 13px;
    }

    .metric span:first-child {
      color: #aeb9c1;
    }

    .metric span:last-child {
      font-variant-numeric: tabular-nums;
      color: #f3f5f4;
      font-weight: 650;
    }

    .legend {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      color: #c7d0d6;
      font-size: 13px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 1fr) auto;
      }

      aside {
        border-left: 0;
        border-top: 1px solid #293138;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Pure Pursuit Cone Track</h1>
    <div class="controls">
      <button id="playPause" type="button" title="Play or pause">Pause</button>
      <button id="reset" type="button" title="Reset simulation">Reset</button>
      <label>
        Speed
        <input id="speedScale" type="range" min="0.25" max="2.5" value="1" step="0.05">
      </label>
      <label>
        Lookahead gain
        <input id="lookaheadGain" type="range" min="0.05" max="0.9" value="0.35" step="0.01">
      </label>
    </div>
  </header>

  <main>
    <canvas id="track"></canvas>
    <aside>
      <div class="metric"><span>Track width</span><span id="trackWidth">3.00 m</span></div>
      <div class="metric"><span>Car width</span><span id="carWidth">1.50 m</span></div>
      <div class="metric"><span>Side clearance</span><span id="clearance">0.75 m</span></div>
      <div class="metric"><span>Speed</span><span id="speed">0.00 m/s</span></div>
      <div class="metric"><span>Target speed</span><span id="targetSpeed">0.00 m/s</span></div>
      <div class="metric"><span>Steering</span><span id="steering">0.00 rad</span></div>
      <div class="metric"><span>Lookahead</span><span id="lookahead">0.00 m</span></div>
      <div class="metric"><span>Target point</span><span id="targetIndex">0</span></div>
      <div class="legend">
        <div class="legend-row"><span class="swatch" style="background:#f4a23a"></span>Left boundary cones</div>
        <div class="legend-row"><span class="swatch" style="background:#3aa0f4"></span>Right boundary cones</div>
        <div class="legend-row"><span class="swatch" style="background:#e9eef2"></span>1.5 m wide car</div>
        <div class="legend-row"><span class="swatch" style="background:#7cc7a0"></span>Pure pursuit target</div>
      </div>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("track");
    const ctx = canvas.getContext("2d");

    const metrics = {
      speed: document.getElementById("speed"),
      targetSpeed: document.getElementById("targetSpeed"),
      steering: document.getElementById("steering"),
      lookahead: document.getElementById("lookahead"),
      targetIndex: document.getElementById("targetIndex"),
      clearance: document.getElementById("clearance"),
    };

    const playPause = document.getElementById("playPause");
    const resetButton = document.getElementById("reset");
    const speedScaleInput = document.getElementById("speedScale");
    const lookaheadGainInput = document.getElementById("lookaheadGain");

    const wheelbase = 1.55;
    const carLength = 2.8;
    const carWidth = 1.5;
    const trackWidth = 3.0;
    const coneSpacing = 2.5;
    const maxSteer = 0.3;
    const minLookahead = 1.0;
    const maxLookahead = 15.0;
    const defaultTargetSpeed = 6.0;
    const dt = 0.02;

    const path = buildTrack();
    const boundaries = buildCones(path);
    let state;
    let lastTargetIndex;
    let integrator;
    let latestHigh;
    let paused = false;
    let lastFrameTime = performance.now();

    reset();
    requestAnimationFrame(loop);

    playPause.addEventListener("click", () => {
      paused = !paused;
      playPause.textContent = paused ? "Play" : "Pause";
    });

    resetButton.addEventListener("click", reset);

    function reset() {
      state = { x: path[0].x - 1.2, y: path[0].y - 0.15, yaw: path[0].yaw, speed: 0 };
      lastTargetIndex = 0;
      integrator = 0;
      latestHigh = purePursuit();
    }

    function buildTrack() {
      const points = [];
      const samples = 900;
      for (let i = 0; i < samples; i += 1) {
        const t = (Math.PI * 2 * i) / samples;
        const radius = 18 + 4 * Math.sin(3 * t);
        const x = radius * Math.cos(t) + 3 * Math.sin(2 * t);
        const y = 0.68 * radius * Math.sin(t);
        const tightness = Math.abs(Math.sin(3 * t));
        const speed = 7.5 - 2.8 * tightness;
        points.push({ x, y, speed });
      }

      for (let i = 0; i < points.length; i += 1) {
        const prev = points[(i - 1 + points.length) % points.length];
        const next = points[(i + 1) % points.length];
        points[i].yaw = Math.atan2(next.y - prev.y, next.x - prev.x);
      }
      return points;
    }

    function buildCones(centerline) {
      const left = [];
      const right = [];
      let distanceSinceCone = 0;
      let previous = centerline[0];

      for (let i = 0; i < centerline.length; i += 1) {
        const point = centerline[i];
        distanceSinceCone += Math.hypot(point.x - previous.x, point.y - previous.y);
        previous = point;

        if (distanceSinceCone < coneSpacing && i !== 0) continue;
        distanceSinceCone = 0;

        const nx = -Math.sin(point.yaw);
        const ny = Math.cos(point.yaw);
        left.push({ x: point.x + nx * trackWidth / 2, y: point.y + ny * trackWidth / 2 });
        right.push({ x: point.x - nx * trackWidth / 2, y: point.y - ny * trackWidth / 2 });
      }
      return { left, right };
    }

    function loop(now) {
      const elapsed = Math.min(0.06, (now - lastFrameTime) / 1000);
      lastFrameTime = now;

      if (!paused) {
        const steps = Math.max(1, Math.round(elapsed / dt));
        for (let i = 0; i < steps; i += 1) {
          update(dt * Number(speedScaleInput.value));
        }
      }

      draw();
      requestAnimationFrame(loop);
    }

    function update(stepDt) {
      const high = purePursuit();
      latestHigh = high;
      const low = speedPI(high.targetSpeed, stepDt);

      const accel = 3.2 * low.throttle - 5.4 * low.brake - 0.07 * state.speed;
      state.speed = Math.max(0, state.speed + accel * stepDt);
      const yawRate = state.speed / wheelbase * Math.tan(high.steering);
      state.yaw += yawRate * stepDt;
      state.x += state.speed * Math.cos(state.yaw) * stepDt;
      state.y += state.speed * Math.sin(state.yaw) * stepDt;

      metrics.speed.textContent = `${state.speed.toFixed(2)} m/s`;
      metrics.targetSpeed.textContent = `${high.targetSpeed.toFixed(2)} m/s`;
      metrics.steering.textContent = `${high.steering.toFixed(2)} rad`;
      metrics.lookahead.textContent = `${high.lookahead.toFixed(2)} m`;
      metrics.targetIndex.textContent = String(high.targetIndex);
      metrics.clearance.textContent = `${((trackWidth - carWidth) / 2).toFixed(2)} m`;
    }

    function purePursuit() {
      const nearest = nearestIndex();
      const lookahead = clamp(
        minLookahead + Number(lookaheadGainInput.value) * state.speed,
        minLookahead,
        maxLookahead,
      );
      let targetIndex = nearest;

      for (let offset = 0; offset < path.length; offset += 1) {
        const index = (nearest + offset) % path.length;
        const point = path[index];
        if (Math.hypot(point.x - state.x, point.y - state.y) >= lookahead) {
          targetIndex = index;
          break;
        }
      }

      lastTargetIndex = targetIndex;
      const target = path[targetIndex];
      const dx = target.x - state.x;
      const dy = target.y - state.y;
      const localX = Math.cos(state.yaw) * dx + Math.sin(state.yaw) * dy;
      const localY = -Math.sin(state.yaw) * dx + Math.cos(state.yaw) * dy;
      const distanceSq = Math.max(localX * localX + localY * localY, 1e-6);
      const curvature = localX <= 0 ? 0 : 2 * localY / distanceSq;
      const steering = clamp(Math.atan(wheelbase * curvature), -maxSteer, maxSteer);
      const targetSpeed = target.speed ?? defaultTargetSpeed;

      return { steering, targetSpeed, targetIndex, lookahead };
    }

    function speedPI(targetSpeed, stepDt) {
      const error = targetSpeed - state.speed;
      integrator = clamp(integrator + error * stepDt, -3, 3);
      const command = clamp(0.35 * error + 0.12 * integrator, -1, 1);
      return {
        throttle: clamp(command, 0, 1),
        brake: clamp(-1.3 * command, 0, 1),
      };
    }

    function nearestIndex() {
      const start = Math.min(lastTargetIndex, path.length - 1);
      let best = start;
      let bestDistance = Infinity;
      for (let offset = 0; offset < path.length; offset += 1) {
        const index = (start + offset) % path.length;
        const point = path[index];
        const distance = (state.x - point.x) ** 2 + (state.y - point.y) ** 2;
        if (distance < bestDistance) {
          bestDistance = distance;
          best = index;
        }
      }
      return best;
    }

    function draw() {
      const dpr = window.devicePixelRatio || 1;
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      if (canvas.width !== Math.round(width * dpr) || canvas.height !== Math.round(height * dpr)) {
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const scale = Math.min(width / 58, height / 42);
      const camera = {
        x: width / 2 - state.x * scale,
        y: height / 2 + state.y * scale,
        scale,
      };

      drawGrid(camera, width, height);
      drawTrack(camera);
      drawLookahead(camera);
      drawCar(camera);
    }

    function worldToScreen(camera, point) {
      return {
        x: camera.x + point.x * camera.scale,
        y: camera.y - point.y * camera.scale,
      };
    }

    function drawGrid(camera, width, height) {
      ctx.save();
      ctx.strokeStyle = "#2a332d";
      ctx.lineWidth = 1;
      const step = camera.scale * 5;
      const offsetX = camera.x % step;
      const offsetY = camera.y % step;
      for (let x = offsetX; x < width; x += step) {
        line(x, 0, x, height);
      }
      for (let y = offsetY; y < height; y += step) {
        line(0, y, width, y);
      }
      ctx.restore();
    }

    function drawTrack(camera) {
      drawPolyline(path, camera, "#6d7a71", 1.5, true);
      drawPolyline(boundaries.left, camera, "rgba(244, 162, 58, 0.35)", 2, true);
      drawPolyline(boundaries.right, camera, "rgba(58, 160, 244, 0.35)", 2, true);
      drawCones(boundaries.left, camera, "#f4a23a");
      drawCones(boundaries.right, camera, "#3aa0f4");
    }

    function drawPolyline(points, camera, color, lineWidth, closed) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      points.forEach((point, index) => {
        const screen = worldToScreen(camera, point);
        if (index === 0) ctx.moveTo(screen.x, screen.y);
        else ctx.lineTo(screen.x, screen.y);
      });
      if (closed) ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function drawCones(cones, camera, color) {
      ctx.save();
      for (const cone of cones) {
        const screen = worldToScreen(camera, cone);
        ctx.beginPath();
        ctx.arc(screen.x, screen.y, Math.max(3.5, 0.16 * camera.scale), 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = "#101316";
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawLookahead(camera) {
      const high = latestHigh ?? purePursuit();
      const target = path[high.targetIndex];
      const targetScreen = worldToScreen(camera, target);
      const carScreen = worldToScreen(camera, state);

      ctx.save();
      ctx.strokeStyle = "rgba(124, 199, 160, 0.65)";
      ctx.lineWidth = 2;
      ctx.setLineDash([7, 7]);
      line(carScreen.x, carScreen.y, targetScreen.x, targetScreen.y);
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(targetScreen.x, targetScreen.y, Math.max(6, 0.25 * camera.scale), 0, Math.PI * 2);
      ctx.fillStyle = "#7cc7a0";
      ctx.fill();
      ctx.restore();
    }

    function drawCar(camera) {
      const center = worldToScreen(camera, state);
      const length = carLength * camera.scale;
      const width = carWidth * camera.scale;

      ctx.save();
      ctx.translate(center.x, center.y);
      ctx.rotate(-state.yaw);

      ctx.fillStyle = "rgba(233, 238, 242, 0.96)";
      ctx.strokeStyle = "#101316";
      ctx.lineWidth = 2;
      roundRect(-length / 2, -width / 2, length, width, 5);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#e35d5b";
      ctx.beginPath();
      ctx.moveTo(length / 2 - 4, 0);
      ctx.lineTo(length / 2 - 17, -width / 2 + 5);
      ctx.lineTo(length / 2 - 17, width / 2 - 5);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#27313a";
      ctx.fillRect(-length * 0.12, -width * 0.34, length * 0.22, width * 0.68);
      ctx.restore();
    }

    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function line(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }
  </script>
</body>
</html>
